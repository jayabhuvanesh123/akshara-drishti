<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload — Akshara-Drishti</title>
  <meta name="description" content="Upload an image of an ancient inscription to detect the script type using the Akshara-Drishti AI model." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Akshara-Drishti</a>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="upload.html" class="active">Upload</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="about.html#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="page-header">
    <p class="section-label gsap-hidden">Script Detection</p>
    <h1 class="section-title gsap-hidden">Upload Ancient Script Image</h1>
    <p class="section-text gsap-hidden">
      Upload an image of an inscription to detect the script type using our AI model.
    </p>
  </header>

  <!-- Upload Interface -->
  <div class="upload-wrapper">
    <div class="card gsap-hidden" id="uploadCard">
      <!-- Drop Zone -->
      <div class="upload-zone" id="uploadZone">
        <p class="upload-zone-text">
          <strong>Drag and drop</strong> an image here
        </p>
        <button class="btn-secondary" id="browseBtn">Browse Image</button>
        <input type="file" id="fileInput" accept="image/*" hidden />
      </div>

      <!-- Preview -->
      <div class="upload-preview" id="uploadPreview">
        <img id="previewImage" src="" alt="Uploaded inscription preview" />
      </div>

      <!-- Actions -->
      <div class="upload-actions">
        <button class="btn-primary" id="detectBtn" disabled>Detect Script</button>
      </div>

      <!-- Loader -->
      <div class="loader" id="loader"></div>

      <!-- Results -->
      <div class="result-card" id="resultCard">
        <p class="result-label">Predicted Script</p>
        <p class="result-value" id="resultScript">—</p>
        <p class="result-confidence">Confidence Score: <span id="resultConfidence">—</span></p>
        <div class="confidence-bar-wrapper">
          <div class="confidence-bar-track">
            <div class="confidence-bar-fill" id="confidenceBar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Akshara-Drishti Research Project</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
  <script src="upload.js"></script>
</body>
</html>
